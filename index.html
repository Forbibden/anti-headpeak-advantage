<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raycast Marker UI</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100vw; height: 100vh;
            overflow: hidden;
            background: transparent;
        }

        #hit-marker {
            position: absolute;
            width: 20px; 
            height: 20px;
            transform: translate(-50%, -50%);
            display: none;
            pointer-events: none;
            z-index: 9999;
        }

        #hit-marker::before, #hit-marker::after {
            content: '';
            position: absolute;
            width: 100%; 
            height: 3px;
            background-color: rgba(231, 76, 60, 0.9);
            top: 50%; 
            left: 0;
            margin-top: -1.5px;
            border-radius: 2px;
        }

        #hit-marker::before {
            transform: rotate(45deg);
        }

        #hit-marker::after {
            transform: rotate(-45deg);
        }
    </style>
</head>
<body>

    <div id="hit-marker"></div>

    <script>
        const marker = document.getElementById('hit-marker');
        let hideTimeout;

        function updateMarker(x, y) {
            marker.style.left = x + 'px';
            marker.style.top = y + 'px';
            marker.style.display = 'block';

            // Kısa süre sonra otomatik gizle
            clearTimeout(hideTimeout);
            hideTimeout = setTimeout(() => {
                marker.style.display = 'none';
            }, 100);
        }

        function hideMarker() {
            marker.style.display = 'none';
        }
    </script>
</body>
</html>
